<div class="profile-card p-4 mb-5">
    <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
        <h5 class="fw-bold mb-0"><i class="fa-solid fa-location-dot text-danger me-2"></i> Sổ địa chỉ nhận hàng</h5>
        <button class="btn btn-danger btn-sm rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#addAddressModal">+ Thêm địa chỉ mới</button>
    </div>
    
    <div id="address-list-container">
        <div class="text-center py-5"><div class="spinner-border text-danger"></div></div>
    </div>
</div>

<div class="modal fade" id="addAddressModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow-lg">
            <div class="modal-header border-bottom-0 pb-0 mt-2">
                <h5 class="modal-title fw-bold fs-5">Thêm địa chỉ</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" id="close-addr-modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="form-add-address">
                    <h6 class="fw-bold small mb-3 text-danger"><i class="fa-solid fa-map-location-dot me-2"></i>Khu vực giao hàng</h6>
                    <div class="mb-3">
                        <select class="form-select rounded-3 text-muted" id="province" required>
                            <option value="">Tỉnh/Thành phố</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <select class="form-select rounded-3 text-muted" id="district" disabled required>
                            <option value="">Quận/Huyện</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <select class="form-select rounded-3 text-muted" id="ward" disabled required>
                            <option value="">Phường/Xã</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <input type="text" class="form-control rounded-3" id="addr-detail" placeholder="Địa chỉ nhà (VD: Thôn Nghiêm Xá)" required>
                    </div>
                    <div class="mb-4 d-flex align-items-center">
                        <label class="form-label small fw-bold mb-0 me-3">Loại địa chỉ:</label>
                        <input type="radio" class="btn-check" name="addr_type" id="type_home" value="Nhà" checked>
                        <label class="btn btn-outline-danger btn-sm rounded-pill px-3 me-2" for="type_home">Nhà</label>
                        <input type="radio" class="btn-check" name="addr_type" id="type_office" value="Văn phòng">
                        <label class="btn btn-outline-danger btn-sm rounded-pill px-3" for="type_office">Văn phòng</label>
                    </div>
                    <div class="form-check form-switch mb-4 d-flex align-items-center justify-content-between p-0">
                        <label class="form-check-label small fw-bold text-dark" for="is_default">Đặt làm địa chỉ mặc định</label>
                        <input class="form-check-input ms-0 fs-5" type="checkbox" role="switch" id="is_default">
                    </div>
                    <button type="submit" class="btn btn-danger w-100 rounded-pill fw-bold py-2 shadow-sm">LƯU ĐỊA CHỈ</button>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="js/address.js"></script>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - LinhLinh Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        @media (min-width: 992px) {
            .sticky-summary { position: sticky; top: 90px; z-index: 10; }
        }
        .coupon-box { border: 1px dashed #d70018; background: #fff5f5; }
        .cart-item-img { width: 80px; height: 80px; object-fit: contain; background: #fff; padding: 5px; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow" style="background-color: var(--primary-color);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fa-solid fa-laptop-code me-2"></i>LINHLINH STORE
            </a>
            <div class="d-flex align-items-center gap-3" id="authArea"></div>
        </div>
    </nav>

    <div class="container my-5 flex-grow-1">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb small">
                <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none text-danger">Trang chủ</a></li>
                <li class="breadcrumb-item active" aria-current="page">Giỏ hàng</li>
            </ol>
        </nav>

        <h3 class="fw-bold mb-4 text-dark">
            <i class="fa-solid fa-cart-shopping text-danger me-2"></i>Giỏ hàng của bạn
        </h3>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 rounded-4 overflow-hidden mb-3">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col" class="ps-4 py-3 text-muted fw-semibold" style="width: 50%;">Sản phẩm</th>
                                        <th scope="col" class="py-3 text-muted fw-semibold">Đơn giá</th>
                                        <th scope="col" class="py-3 text-muted fw-semibold text-center">Số lượng</th>
                                        <th scope="col" class="pe-4 py-3 text-muted fw-semibold text-end">Xóa</th>
                                    </tr>
                                </thead>
                                <tbody id="cart-body">
                                    <tr><td colspan="4" class="text-center py-5"><div class="spinner-border text-danger"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center px-2">
                    <a href="index.html" class="text-decoration-none fw-bold text-danger">
                        <i class="fa-solid fa-arrow-left me-1"></i> Tiếp tục mua sắm
                    </a>
                </div>
            </div>

            <div class="col-lg-4" id="cart-summary-area"></div>
        </div>
    </div>

    <footer class="mt-auto bg-white border-top py-4">
        <div class="container text-center small text-muted">
            &copy; LinhLinh Store. All rights reserved. Design by LinhLinh.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/config.js"></script>
    <script src="js/storage-helper.js"></script>
    <script src="js/api-helper.js"></script>
    <script src="js/ui-helper.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>

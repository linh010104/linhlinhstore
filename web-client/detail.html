<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - LinhLinh Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fa-solid fa-laptop-code me-2"></i>LINHLINH STORE
            </a>
            <div class="d-flex align-items-center gap-3" id="authArea"></div>
        </div>
    </nav>

    <div class="container my-5 flex-grow-1">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Trang chủ</a></li>
                <li class="breadcrumb-item active" aria-current="page" id="breadcrumb-name">Chi tiết</li>
            </ol>
        </nav>

        <div class="card shadow border-0 rounded-4 overflow-hidden mb-4">
            <div class="card-body p-0">
                <div class="row g-0">
                    <div class="col-md-5 bg-white p-4 border-end d-flex flex-column">
                        <div class="d-flex align-items-center justify-content-center flex-grow-1 mb-3" style="height: 350px;">
                            <img id="detail-img" src="" class="img-fluid object-fit-contain" style="max-height: 100%; width: 100%; transition: 0.3s;" alt="Ảnh sản phẩm">
                        </div>
                        <div class="d-flex justify-content-center gap-2 overflow-auto py-2" id="thumbnail-container">
                        </div>
                    </div>

                    <div class="col-md-7 p-4 p-lg-5">
                        <small class="text-uppercase text-muted fw-bold" id="detail-category">Danh mục</small>
                        <h2 class="fw-bold mb-3 text-primary mt-2" id="detail-name">Đang tải tên...</h2>
                        <h3 class="text-danger fw-bold mb-4" id="detail-price">0 đ</h3>
                        
                        <div id="variants-container" class="mb-4"></div>

                        <p class="text-muted mb-4" id="detail-desc">Mô tả sản phẩm...</p>

                        <div class="d-flex align-items-center mb-4">
                            <span class="fw-bold me-3">Số lượng:</span>
                            <div class="input-group" style="width: 140px;">
                                <button class="btn btn-outline-secondary" type="button" onclick="changeQty(-1)">-</button>
                                <input type="text" class="form-control text-center" id="qty-input" value="1" readonly>
                                <button class="btn btn-outline-secondary" type="button" onclick="changeQty(1)">+</button>
                            </div>
                        </div>

                        <div class="d-flex gap-3">
                            <button onclick="addToCartFromDetail()" class="btn btn-outline-primary btn-lg rounded-pill px-4 fw-bold">
                                <i class="fa-solid fa-cart-plus me-2"></i> Thêm vào giỏ
                            </button>
                            <button onclick="buyNowFromDetail()" class="btn btn-danger btn-lg rounded-pill px-5 fw-bold shadow">
                                Mua Ngay
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0 mb-5 rounded-4 overflow-hidden">
            <div class="card-header bg-white py-3 border-0 border-bottom">
                <h5 class="fw-bold mb-0 text-dark">
                    <i class="fa-solid fa-microchip text-primary me-2"></i> Thông số kỹ thuật
                </h5>
            </div>
            <div class="card-body p-0">
                <table class="table table-striped table-hover mb-0" id="spec-table" style="font-size: 15px;">
                    <tbody>
                        <tr>
                            <td class="text-muted text-center py-4">Đang cập nhật thông số...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <h4 class="fw-bold mb-3 text-primary border-start border-5 border-primary ps-3">Sản phẩm tương tự</h4>
        <div class="row g-4" id="related-products">
            <div class="col-12 text-center text-muted">Đang tìm sản phẩm...</div>
        </div>
    </div>

    <footer class="mt-auto bg-white border-top">
        <div class="container py-4">
            <div class="text-center small text-muted">
                &copy; 2026 LinhLinh Store. All rights reserved.
            </div>
        </div>
    </footer>

    <div class="modal fade" id="checkoutModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-danger text-white border-0">
                    <h5 class="modal-title fw-bold"><i class="fa-solid fa-truck-fast me-2"></i> Thông Tin Đặt Hàng</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Người nhận <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fa-solid fa-user"></i></span>
                            <input type="text" class="form-control" id="checkout-name" placeholder="Họ và tên">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Số điện thoại <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fa-solid fa-phone"></i></span>
                            <input type="text" class="form-control" id="checkout-phone" placeholder="Số điện thoại">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Địa chỉ giao hàng <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fa-solid fa-map-location-dot"></i></span>
                            <textarea class="form-control" id="checkout-address" rows="2" placeholder="Địa chỉ chi tiết"></textarea>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Thanh toán</label>
                        <select class="form-select" id="checkout-payment">
                            <option value="COD">Thanh toán khi nhận hàng (COD)</option>
                            <option value="BANK">Chuyển khoản ngân hàng</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Ghi chú</label>
                        <input type="text" class="form-control" id="checkout-note" placeholder="Ghi chú thêm...">
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0 justify-content-end">
                    <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-danger rounded-pill px-4" onclick="submitDirectBuy()"><i class="fa-solid fa-paper-plane me-2"></i> Xác Nhận</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/detail.js"></script>
</body>
</html>

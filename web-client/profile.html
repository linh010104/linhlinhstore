<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ Sơ Khách Hàng - LinhLinhStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* CSS Riêng cho Giao diện Profile */
        body { background-color: #f4f6f8; }
        .profile-card {
            background: #fff; border-radius: 15px; border: none;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        .profile-sidebar .list-group-item {
            border: none; padding: 12px 20px; color: #4a4a4a; font-weight: 500;
            transition: all 0.2s; border-radius: 8px !important; margin-bottom: 2px;
        }
        .profile-sidebar .list-group-item:hover { background-color: #fef2f2; color: #d70018; }
        .profile-sidebar .list-group-item.active {
            background-color: #fef2f2; color: #d70018; border-left: 4px solid #d70018;
            border-radius: 8px !important;
        }
        .profile-sidebar .list-group-item i { width: 25px; text-align: center; margin-right: 10px; font-size: 1.1rem; }
        .alert-promo { background-color: #e8f4fd; border: 1px solid #d0e7fb; border-radius: 10px; color: #0066cc; font-size: 14px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow" style="background-color: var(--primary-color);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fa-solid fa-arrow-left me-2"></i> TRANG CHỦ</a>
            <div class="d-flex align-items-center gap-3" id="authArea"></div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="profile-card p-4">
            <div class="row align-items-center">
                <div class="col-md-4 d-flex align-items-center border-end">
                    <img src="https://placehold.co/80x80/ffe3e3/d70018?text=L" class="rounded-circle me-3" style="width: 70px; height: 70px; object-fit: cover;">
                    <div>
                        <h5 class="fw-bold mb-1" id="overview-name">Đang tải...</h5>
                        <p class="text-muted mb-1 small"><i class="fa-solid fa-phone small"></i> <span id="overview-phone">---</span></p>
                        <span id="overview-tier" class="badge bg-secondary text-white rounded-pill px-3 py-1">S-NULL</span>
                    </div>
                </div>
                
                <div class="col-md-4 text-center border-end">
                    <div class="d-flex justify-content-center align-items-center gap-4">
                        <div>
                            <h4 class="fw-bold text-dark mb-0" id="overview-orders">0</h4>
                            <p class="text-muted small mb-0">Tổng đơn hoàn tất</p>
                        </div>
                        <div>
                            <h4 class="fw-bold text-danger mb-0" id="overview-spent">0đ</h4>
                            <p class="text-muted small mb-0">Tổng tiền tích lũy</p>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-4 text-center">
                    <p class="text-muted small mb-1">Bạn đang ở kênh thành viên</p>
                    <div class="d-inline-flex align-items-center border rounded px-3 py-2">
                        <img src="https://placehold.co/30x30/d70018/ffffff?text=L" class="rounded me-2">
                        <span class="fw-bold">LinhLinhStore</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-3 mb-4">
                <div class="profile-card p-2 profile-sidebar">
                    <div class="list-group list-group-flush">
                        <a href="profile.html" class="list-group-item list-group-item-action active"><i class="fa-solid fa-user-gear"></i> Thông tin tài khoản</a>
                        <a href="orders.html" class="list-group-item list-group-item-action"><i class="fa-solid fa-clipboard-list"></i> Lịch sử mua hàng</a>
                        <a href="#" class="list-group-item list-group-item-action text-danger mt-3" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</a>
                    </div>
                </div>
            </div>

            <div class="col-lg-9">
                <div class="alert alert-promo d-flex justify-content-between align-items-center mb-3">
                    <div><i class="fa-solid fa-circle-info me-2"></i> Cập nhật đầy đủ thông tin để mua hàng nhanh hơn.</div>
                </div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="profile-card p-4 h-100">
                            <h5 class="fw-bold mb-4 border-bottom pb-2"><i class="fa-solid fa-user-pen text-danger me-2"></i> Hồ sơ cá nhân</h5>
                            <form id="profile-form">
                                <div class="mb-3">
                                    <label class="form-label fw-bold text-muted small">Tên đăng nhập</label>
                                    <input type="text" id="username" class="form-control bg-light" disabled>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold small">Họ và tên</label>
                                    <input type="text" id="fullname" class="form-control">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold small">Email</label>
                                    <input type="email" id="email" class="form-control">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold small">Số điện thoại</label>
                                    <input type="text" id="phone" class="form-control">
                                </div>
                                <button type="submit" class="btn btn-danger w-100 rounded-pill fw-bold py-2 mt-2">LƯU THAY ĐỔI</button>
                            </form>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="profile-card p-4 h-100">
                            <h5 class="fw-bold mb-4 border-bottom pb-2"><i class="fa-solid fa-shield-halved text-danger me-2"></i> Đổi Mật Khẩu</h5>
                            <div class="mb-3 mt-4">
                                <label class="form-label fw-bold small">Mật khẩu hiện tại</label>
                                <input type="password" id="old-password" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold small">Mật khẩu mới</label>
                                <input type="password" id="new-password" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold small">Xác nhận mật khẩu mới</label>
                                <input type="password" id="confirm-password" class="form-control">
                            </div>
                            <button type="button" class="btn btn-outline-danger w-100 rounded-pill fw-bold py-2 mt-4" onclick="updatePassword()">CẬP NHẬT MẬT KHẨU</button>
                        </div>
                    </div>
                </div>

                <div class="profile-card p-4 mt-4 mb-5">
                    <h5 class="fw-bold mb-4 border-bottom pb-2">
                        <i class="fa-solid fa-heart text-danger me-2"></i> Sản phẩm yêu thích
                    </h5>
                    <div class="row g-3" id="favorite-list">
                        <div class="col-12 text-center py-4">
                            <div class="spinner-border text-danger spinner-border-sm"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/storage-helper.js"></script>
    <script src="js/api-helper.js"></script>
    <script src="js/ui-helper.js"></script>
    <script src="js/config.js"></script> 
    <script src="js/auth.js"></script>
    
    <script>
        function loadFavorites() {
            const favs = JSON.parse(localStorage.getItem('linhlinh_favorites')) || [];
            const container = document.getElementById('favorite-list');
            if(!container) return;

            // Nếu trống
            if(favs.length === 0) {
                container.innerHTML = `
                    <div class="col-12 text-center text-muted py-4">
                        <img src="https://placehold.co/80x80/f4f6f8/a3a3a3?text=Heart" class="rounded-circle mb-3 border p-2">
                        <p class="mb-0">Bạn chưa có sản phẩm yêu thích nào.</p>
                        <a href="index.html" class="text-danger fw-bold text-decoration-none small">Mua sắm ngay</a>
                    </div>
                `;
                return;
            }

            let html = '';
            favs.forEach(p => {
                html += `
                <div class="col-md-6 col-lg-4">
                    <div class="card h-100 border rounded-3 p-2 d-flex flex-row align-items-center shadow-sm position-relative" style="transition: transform 0.2s;">
                        <a href="detail.html?id=${p.id}">
                            <img src="${p.image}" class="rounded me-3" style="width: 60px; height: 60px; object-fit: contain;">
                        </a>
                        <div>
                            <a href="detail.html?id=${p.id}" class="text-decoration-none text-dark">
                                <h6 class="mb-1 text-truncate" style="font-size: 13px; max-width: 140px;" title="${p.name}">${p.name}</h6>
                            </a>
                            <span class="text-danger fw-bold" style="font-size: 13px;">${Number(p.price).toLocaleString('vi-VN')}đ</span>
                        </div>
                        <button class="btn btn-sm text-danger position-absolute top-0 end-0 m-1 p-1 bg-white" style="border-radius: 50%;" onclick="removeFavorite(${p.id})">
                            <i class="fa-solid fa-heart"></i>
                        </button>
                    </div>
                </div>
                `;
            });
            container.innerHTML = html;
        }

        // Hàm xóa trực tiếp trên trang Profile
        window.removeFavorite = function(id) {
            let favs = JSON.parse(localStorage.getItem('linhlinh_favorites')) || [];
            favs = favs.filter(item => item.id !== id);
            localStorage.setItem('linhlinh_favorites', JSON.stringify(favs));
            loadFavorites(); // Load lại danh sách ngay lập tức
            
            if(typeof UIHelper !== 'undefined') {
                UIHelper.showSuccess('Đã bỏ thích', `Đã xóa sản phẩm khỏi danh sách yêu thích.`);
            }
        };

        document.addEventListener("DOMContentLoaded", () => {
            const token = StorageHelper.getToken();
            if (!token) {
                alert("Vui lòng đăng nhập!");
                window.location.href = "login.html";
                return;
            }

            // Gọi hàm load sản phẩm yêu thích
            loadFavorites();

            // 1. LẤY THÔNG TIN CÁ NHÂN
            fetch(`${CONFIG.BASE_URL}/auth/profile`, {
                headers: { "Authorization": "Bearer " + token }
            })
            .then(res => res.json())
            .then(user => {
                if (user.message) return alert("Lỗi: " + user.message);
                
                // Điền vào Form
                document.getElementById("username").value = user.username;
                document.getElementById("fullname").value = user.full_name || "";
                document.getElementById("email").value = user.email || "";
                document.getElementById("phone").value = user.phone || "";
                
                // Đổ lên Giao diện Tổng quan
                document.getElementById("overview-name").innerText = user.full_name || user.username;
                document.getElementById("overview-phone").innerText = user.phone || "Chưa cập nhật";
            }).catch(err => console.error(err));

            // 2. LẤY THỐNG KÊ ĐƠN HÀNG
            fetch(`${CONFIG.BASE_URL}/orders/my/stats`, {
                headers: { "Authorization": "Bearer " + token }
            })
            .then(res => res.ok ? res.json() : { total_orders: 0, total_spent: 0 }) 
            .then(stats => {
                const spent = Number(stats.total_spent || 0);
                document.getElementById("overview-orders").innerText = stats.total_orders || 0;
                document.getElementById("overview-spent").innerText = spent.toLocaleString('vi-VN') + "đ";

                // Đổi màu Hạng thành viên cho xịn
                const tierBadge = document.getElementById("overview-tier");
                if (spent >= 10000000) {
                    tierBadge.innerText = "S-VIP";
                    tierBadge.className = "badge bg-warning text-dark rounded-pill px-3 py-1";
                } else if (spent > 0) {
                    tierBadge.innerText = "S-NEW";
                    tierBadge.className = "badge bg-danger text-white rounded-pill px-3 py-1";
                }
            }).catch(err => console.error("Lỗi lấy stats:", err));

            // 3. XỬ LÝ LƯU FORM HỒ SƠ
            document.getElementById("profile-form").addEventListener("submit", (e) => {
                e.preventDefault();
                const data = {
                    full_name: document.getElementById("fullname").value,
                    email: document.getElementById("email").value,
                    phone: document.getElementById("phone").value
                };

                fetch(`${CONFIG.BASE_URL}/auth/profile`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                    body: JSON.stringify(data)
                })
                .then(res => res.json())
                .then(response => {
                    alert(response.message);
                    location.reload(); 
                }).catch(err => alert("Có lỗi xảy ra khi cập nhật!"));
            });
        });
    </script>
</body>
</html>

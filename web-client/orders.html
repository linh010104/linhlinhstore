<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>LinhLinhStore - Đơn hàng của tôi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fa-solid fa-arrow-left me-2"></i> TRANG CHỦ</a>
            <div class="d-flex align-items-center gap-3" id="authArea"></div>
        </div>
    </nav>

    <div class="container my-5 flex-grow-1">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-header bg-white py-3 border-0">
                <h4 class="fw-bold mb-0 text-primary"><i class="fa-solid fa-box-open me-2"></i> Đơn hàng của tôi</h4>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light text-muted small text-uppercase">
                            <tr>
                                <th class="ps-4 py-3">Mã đơn</th>
                                <th class="py-3">Ngày đặt</th>
                                <th class="py-3">Tổng tiền</th>
                                <th class="py-3">Trạng thái</th>
                                <th class="text-end pe-4 py-3">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="order-history-list">
                            <tr><td colspan="5" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="orderDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow-lg">
                <div class="modal-header bg-primary text-white border-0 rounded-top-4">
                    <h5 class="modal-title fw-bold"><i class="fa-solid fa-circle-info me-2"></i>Chi tiết đơn hàng #<span id="modal-order-id"></span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row g-4">
                        <div class="col-md-5 border-end">
                            <h6 class="fw-bold text-primary mb-3">Thông tin nhận hàng</h6>
                            <div class="mb-2">
                                <label class="small text-muted fw-bold">Người nhận</label>
                                <input type="text" id="modal-name" class="form-control form-control-sm" disabled>
                            </div>
                            <div class="mb-2">
                                <label class="small text-muted fw-bold">Số điện thoại</label>
                                <input type="text" id="modal-phone" class="form-control form-control-sm" disabled>
                            </div>
                            <div class="mb-2">
                                <label class="small text-muted fw-bold">Địa chỉ</label>
                                <textarea id="modal-address" class="form-control form-control-sm" rows="2" disabled></textarea>
                            </div>
                            <div class="mb-2">
                                <label class="small text-muted fw-bold">Ghi chú</label>
                                <textarea id="modal-note" class="form-control form-control-sm" rows="2" disabled></textarea>
                            </div>
                            
                            <div id="return-info-box" class="alert alert-danger py-2 small mt-3 d-none">
                                <i class="fa-solid fa-circle-info me-1"></i> <strong>Lý do trả hàng:</strong> 
                                <span id="modal-return-reason"></span>
                            </div>
                        </div>

                        <div class="col-md-7">
                            <h6 class="fw-bold text-primary mb-3">Sản phẩm đã đặt</h6>
                            <div class="list-group list-group-flush border rounded overflow-auto" style="max-height: 280px;" id="modal-items-list"></div>
                            <div class="d-flex justify-content-between mt-3 px-2 align-items-center">
                                <span class="fw-bold fs-6">Tổng thanh toán:</span>
                                <span class="text-danger fw-bold fs-4" id="modal-total">0 đ</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer bg-light border-0 rounded-bottom-4 py-3" id="modal-footer-actions"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="returnReasonModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow-lg">
                <div class="modal-header bg-danger text-white border-0 rounded-top-4">
                    <h5 class="modal-title fw-bold"><i class="fa-solid fa-rotate-left me-2"></i> Yêu cầu trả hàng</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 text-center">
                    <i class="fa-solid fa-clipboard-question text-danger mb-3" style="font-size: 3rem;"></i>
                    <p class="text-muted small mb-4">Vui lòng chọn lý do để Shop hỗ trợ bạn nhanh nhất.</p>
                    
                    <div class="mb-3 text-start">
                        <label class="form-label fw-bold small">Lý do trả hàng <span class="text-danger">*</span></label>
                        <select class="form-select rounded-3 shadow-sm" id="select-return-reason">
                            <option value="" disabled selected>-- Chọn lý do --</option>
                            <option value="Hàng bị lỗi kỹ thuật">Hàng bị lỗi kỹ thuật / Hư hỏng</option>
                            <option value="Giao sai sản phẩm">Giao sai sản phẩm / Sai mẫu mã</option>
                            <option value="Thiếu phụ kiện">Thiếu phụ kiện / Quà tặng</option>
                            <option value="Hàng giả / Nhái">Nghi ngờ hàng giả / Hàng nhái</option>
                            <option value="Khác">Lý do khác...</option>
                        </select>
                    </div>

                    <div class="form-floating text-start shadow-sm">
                        <textarea class="form-control rounded-3" id="input-return-reason" placeholder="Chi tiết..." style="height: 100px"></textarea>
                        <label for="input-return-reason">Mô tả chi tiết (Tùy chọn)</label>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0 pb-4 justify-content-center">
                    <button type="button" class="btn btn-light rounded-pill px-4 me-2 fw-bold" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-danger rounded-pill px-4 fw-bold shadow-sm" id="btn-confirm-return" onclick="confirmReturnRequest()">Gửi yêu cầu</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white border-top py-4 mt-auto">
        <div class="container text-center small text-muted">
            &copy; LinhLinh Store. All rights reserved.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/orders.js"></script> 
</body>
</html>
